name: urbanfix
services:
  urbanfix-db:
    image: postgres:15-alpine
    container_name: urbanfix_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pwclab2026
    ports:
      - "5433:5432"
    volumes:
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    restart: unless-stopped